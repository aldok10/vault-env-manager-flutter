name: Flutter Lint

on:
  push:
    branches: [feat/code-quality-security-cicd]
  pull_request:
    branches: [feat/code-quality-security-cicd]
  schedule:
    - cron: "0 0 * * 0"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.16.9"
          channel: "stable"
      - run: flutter pub get
      - run: flutter analyze --fatal-infos