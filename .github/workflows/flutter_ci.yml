name: Flutter CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint-and-test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
          # flutter-version: '3.29.0' # Optional: Pin version
          
      - name: Create .env from example
        run: cp assets/.env.example assets/.env

      - name: Install dependencies
        run: flutter pub get
        
      # Formatting, static analysis, unit tests, and the Web smoke-build are
      # temporarily disabled while the focus is on hardening the Desktop build
      # pipeline (see `.github/workflows/build.yml`). Re-enable once the Linux
      # and Windows builds are stable and the codebase has been reformatted
      # under the Dart 3.11 "tall style" formatter.
      # - name: Verify formatting
      #   run: dart format --output=none --set-exit-if-changed .
      #
      # - name: Static Analysis
      #   run: flutter analyze
      #
      # - name: Unit Tests
      #   run: flutter test --coverage
      #
      # - name: Check Web Build Compatibility
      #   run: flutter build web --no-pub
