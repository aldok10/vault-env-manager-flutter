name: Flutter Release

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  # Job to prepare the release environment
  prepare:
    name: Prepare Environment
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Get version from pubspec.yaml
        id: get_version
        run: |
          VERSION=$(grep '^version: ' pubspec.yaml | cut -d ' ' -f 2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

  # Job to build for Mobile (Android & iOS)
  build-mobile:
    name: Build Mobile (Android & iOS)
    needs: prepare
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
          
      - name: Install dependencies
        run: flutter pub get
        
      - name: Build Android APK
        run: flutter build apk --release --split-per-abi
        
      - name: Build Android App Bundle (AAB)
        run: flutter build appbundle --release
        
      - name: Build iOS IPA (Unsigned)
        run: flutter build ios --release --no-codesign
        
      - name: Create iOS Artifact
        run: |
          cd build/ios/iphoneos
          mkdir -p Payload
          mv Runner.app Payload/
          zip -r Runner.ipa Payload/
          
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mobile-artifacts
          path: |
            build/app/outputs/flutter-apk/*.apk
            build/app/outputs/bundle/release/*.aab
            build/ios/iphoneos/Runner.ipa

  # Job to build for Web & Desktop (macOS, Linux, Windows)
  build-desktop-web:
    name: Build Web & Desktop
    needs: prepare
    strategy:
      matrix:
        include:
          - target: web
            os: ubuntu-latest
          - target: macos
            os: macos-latest
          - target: windows
            os: windows-latest
          - target: linux
            os: ubuntu-latest

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
          
      - name: Enable Desktop Support
        run: |
          flutter config --enable-macos-desktop
          flutter config --enable-windows-desktop
          flutter config --enable-linux-desktop
          
      - name: Install dependencies
        run: flutter pub get
        
      - name: Install Linux Dependencies
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev
          
      - name: Build Target
        run: flutter build ${{ matrix.target }} --release
        
      - name: Package Artifact
        id: package
        shell: bash
        run: |
          if [ "${{ matrix.target }}" == "web" ]; then
            cd build/web && zip -r ../../web-release.zip .
            echo "artifact_path=web-release.zip" >> $GITHUB_OUTPUT
          elif [ "${{ matrix.target }}" == "macos" ]; then
            cd build/macos/Build/Products/Release && zip -r ../../../../../macos-release.zip .
            echo "artifact_path=macos-release.zip" >> $GITHUB_OUTPUT
          elif [ "${{ matrix.target }}" == "windows" ]; then
            cd build/windows/x64/runner/Release && 7z a ../../../../../windows-release.zip .
            echo "artifact_path=windows-release.zip" >> $GITHUB_OUTPUT
          elif [ "${{ matrix.target }}" == "linux" ]; then
            cd build/linux/x64/release/bundle && zip -r ../../../../../linux-release.zip .
            echo "artifact_path=linux-release.zip" >> $GITHUB_OUTPUT
          fi
          
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}-release
          path: ${{ steps.package.outputs.artifact_path }}
