name: Android APK Build

# Triggers: every push to main and every pull request targeting main.
# Desktop / Web / iOS release pipelines are handled by `flutter_release.yml`.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: android-apk-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FLUTTER_CHANNEL: stable
  # Pin the Flutter version so the pipeline is reproducible. Matches pubspec Dart SDK >= 3.11.4.
  FLUTTER_VERSION: 3.35.5
  JAVA_VERSION: 17

jobs:
  build-apk:
    name: Build Release APK
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # Hoist secret to the job scope so step-level `if:` can read it via the env context.
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Flutter ${{ env.FLUTTER_VERSION }}
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Cache Pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Materialize runtime env file
        # Write the runtime .env asset from the APP_ENV_FILE secret when provided; otherwise
        # fall back to the tracked example so analyzer/build still succeed for forks and PRs.
        env:
          APP_ENV_FILE: ${{ secrets.APP_ENV_FILE }}
        run: |
          if [ -n "${APP_ENV_FILE}" ]; then
            printf '%s' "${APP_ENV_FILE}" > assets/.env
            echo "Injected assets/.env from APP_ENV_FILE secret."
          else
            cp assets/.env.example assets/.env
            echo "APP_ENV_FILE secret not set — using assets/.env.example (non-sensitive defaults)."
          fi

      - name: Decode release keystore
        if: env.ANDROID_KEYSTORE_BASE64 != ''
        run: |
          mkdir -p android/app
          printf '%s' "${ANDROID_KEYSTORE_BASE64}" | base64 --decode > android/app/upload-keystore.jks
          echo "VAULT_KEYSTORE_PATH=${GITHUB_WORKSPACE}/android/app/upload-keystore.jks" >> "$GITHUB_ENV"

      - name: Install Dart/Flutter dependencies
        run: flutter pub get

      - name: Static analysis
        run: flutter analyze

      - name: Unit tests
        run: flutter test --no-pub

      - name: Build release APK
        env:
          # Keystore credentials are consumed by android/app/build.gradle.kts via System.getenv().
          # When ANDROID_KEYSTORE_BASE64 is unset the release build falls back to debug signing
          # so PRs from forks still produce a valid (unsigned-for-upload) installable APK.
          VAULT_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          VAULT_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          VAULT_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          # Public build metadata injected as Dart compile-time constants.
          APP_BUILD_NUMBER: ${{ github.run_number }}
          APP_GIT_SHA: ${{ github.sha }}
        run: |
          flutter build apk --release \
            --dart-define=APP_BUILD_NUMBER="${APP_BUILD_NUMBER}" \
            --dart-define=APP_GIT_SHA="${APP_GIT_SHA}" \
            --dart-define=APP_ENVIRONMENT=ci

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: vault-env-manager-apk-${{ github.run_number }}
          path: build/app/outputs/flutter-apk/*.apk
          if-no-files-found: error
          retention-days: 14
          compression-level: 0
