name: Desktop Build

# Triggers on every push and pull_request targeting main, plus manual dispatch.
# This pipeline focuses on desktop targets (Linux / Windows / macOS). Tagged
# full-matrix releases are handled separately by `flutter_release.yml`.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: desktop-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FLUTTER_CHANNEL: stable
  # Pin the Flutter version so the pipeline is reproducible. Must ship a Dart SDK
  # that satisfies pubspec's `^3.11.4` constraint (Flutter >= 3.41.x).
  FLUTTER_VERSION: 3.41.7

jobs:
  build-desktop:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux
            os: ubuntu-latest
            build_cmd: flutter build linux --release
            artifact_glob: build/linux/x64/release/bundle/**
          - target: windows
            os: windows-latest
            build_cmd: flutter build windows --release
            artifact_glob: build/windows/x64/runner/Release/**
          - target: macos
            os: macos-latest
            build_cmd: flutter build macos --release
            artifact_glob: build/macos/Build/Products/Release/*.app/**

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter ${{ env.FLUTTER_VERSION }}
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Cache Pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Enable desktop support
        run: |
          flutter config --enable-linux-desktop
          flutter config --enable-windows-desktop
          flutter config --enable-macos-desktop
        shell: bash

      - name: Install Linux desktop system dependencies
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev

      - name: Materialize runtime env file
        # Write the runtime .env asset from the APP_ENV_FILE secret when provided; otherwise
        # fall back to the tracked example so analyzer/build still succeed for forks and PRs.
        env:
          APP_ENV_FILE: ${{ secrets.APP_ENV_FILE }}
        shell: bash
        run: |
          if [ -n "${APP_ENV_FILE}" ]; then
            printf '%s' "${APP_ENV_FILE}" > assets/.env
            echo "Injected assets/.env from APP_ENV_FILE secret."
          else
            cp assets/.env.example assets/.env
            echo "APP_ENV_FILE secret not set - using assets/.env.example (non-sensitive defaults)."
          fi

      - name: Install Dart/Flutter dependencies
        run: flutter pub get

      # Static analysis and unit tests are temporarily disabled on this pipeline
      # so the Desktop build can be validated in isolation. They still run on
      # `.github/workflows/flutter_ci.yml` for PR-level linting/testing.
      # - name: Static analysis
      #   run: flutter analyze
      #
      # - name: Unit tests
      #   run: flutter test --no-pub

      - name: Build ${{ matrix.target }}
        env:
          # Public build metadata injected as Dart compile-time constants.
          APP_BUILD_NUMBER: ${{ github.run_number }}
          APP_GIT_SHA: ${{ github.sha }}
        shell: bash
        run: |
          ${{ matrix.build_cmd }} \
            --dart-define=APP_BUILD_NUMBER="${APP_BUILD_NUMBER}" \
            --dart-define=APP_GIT_SHA="${APP_GIT_SHA}" \
            --dart-define=APP_ENVIRONMENT=ci

      - name: Upload ${{ matrix.target }} artifact
        uses: actions/upload-artifact@v4
        with:
          name: vault-env-manager-${{ matrix.target }}-${{ github.run_number }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error
          retention-days: 14
          compression-level: 6
